name: local
description: Caisse enregistreuse pour restaurant - Tunisie
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.3.3
  pdf: ^3.10.8
  printing: ^5.12.0
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  responsive_framework: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/bingo.jpg"
  image_path: "assets/bingo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
